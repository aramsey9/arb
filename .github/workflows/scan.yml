name: ArbEdge Background Scanner

on:
  schedule:
    - cron: '*/10 10-23 * * *'
    - cron: '*/10 0-2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-scanner]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run ArbEdge Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: node scanner.js
