name: ArbEdge Background Scanner

on:
  schedule:
    # Ticks every 5 min (GitHub's reliable floor). The app's "Scan interval"
    # field throttles this down to whatever cadence you set (>=5 min).
    - cron: '*/5 10-23 * * *'
    - cron: '*/5 0-2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [run-scanner]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore notify state
        uses: actions/cache/restore@v4
        with:
          path: notif-state.json
          key: notif-state-${{ github.run_id }}
          restore-keys: |
            notif-state-

      - name: Run ArbEdge Scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        run: node scanner.js

      - name: Save notify state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: notif-state.json
          key: notif-state-${{ github.run_id }}
